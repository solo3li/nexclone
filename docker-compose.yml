services:
  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexclone-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    networks:
      - nexclone_network
    depends_on:
      - backend

  # ASP.NET Core API & Admin
  backend:
    build:
      context: ./NexClone.Backend
      dockerfile: Dockerfile
    container_name: nexclone-backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - nexclone_network
    depends_on:
      - minio

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: nexclone-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_API_CORS_ALLOW_ORIGIN=*
      - MINIO_SERVER_URL=http://178.62.192.74:9000
      - MINIO_BROWSER_REDIRECT_URL=http://178.62.192.74:9001
    command: server /data --console-address ":9001"
    networks:
      - nexclone_network
    volumes:
      - minio_data:/data

  # Create MinIO default bucket
  createbuckets:
    image: minio/mc
    container_name: nexclone-minio-setup
    depends_on:
      - minio
    networks:
      - nexclone_network
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/nexmedia;
      /usr/bin/mc policy set public myminio/nexmedia;
      exit 0;
      "

volumes:
  minio_data:

networks:
  nexclone_network:
    driver: bridge
