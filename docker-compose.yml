services:
  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: nexclone-frontend
    ports:
      - "3000:3000"
    env_file:
      - .front.env
    networks:
      - nexclone_network
    depends_on:
      - backend

  # ASP.NET Core API & Admin
  backend:
    build:
      context: ./NexClone.Backend
      dockerfile: Dockerfile
    container_name: nexclone-backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    env_file:
      - .backend.env
    networks:
      - nexclone_network
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: postgres:15
    container_name: nexclone-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: nexclonedb
    ports:
      - "5432:5432"
    networks:
      - nexclone_network
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: nexclone-redis
    ports:
      - "6379:6379"
    networks:
      - nexclone_network
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    container_name: nexclone-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    networks:
      - nexclone_network
    volumes:
      - miniodata:/data

networks:
  nexclone_network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
